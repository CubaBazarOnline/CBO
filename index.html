<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon estándar en múltiples formatos y tamaños -->
    <link rel="icon" type="image/png" sizes="50x50" href="logo.png">
    <!-- Favicon en formato ICO (para máxima compatibilidad) -->
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <!-- Apple Touch Icon en múltiples tamaños -->
    <link rel="apple-touch-icon" sizes="100x100" href="logo.png">
    <!-- Safari pinned tab icon -->
    <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5">
    <!-- Microsoft application metadata -->
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="logo.png">
    <meta name="msapplication-config" content="/browserconfig.xml">
    <!-- Manifest para PWA -->
    <link rel="manifest" href="/site.webmanifest">
    <!-- Color de tema para navegadores móviles -->
    <meta name="theme-color" content="#ffffff">
    <!-- Precomposed para evitar efectos visuales en iOS -->
    <link rel="apple-touch-icon-precomposed" href="logo.png">
    <title>Mantenimiento del Sistema CBO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --hologram-blue: rgba(0, 255, 255, 0.7);
            --hologram-pink: rgba(255, 0, 255, 0.7);
            --glow-color: rgba(100, 255, 255, 0.8);
            --critical: rgba(255, 50, 50, 0.8);
            --warning: rgba(255, 200, 0, 0.8);
            --ok: rgba(0, 255, 100, 0.8);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a20;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.05) 25%, rgba(0, 255, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, 0.05) 75%, rgba(0, 255, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            opacity: 0.3;
            z-index: -1;
        }
        
        .hologram-container {
            background: rgba(10, 20, 40, 0.85);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            border: 1px solid var(--hologram-blue);
            position: relative;
            overflow: hidden;
        }
        
        .hologram-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--hologram-blue), var(--hologram-pink), transparent);
            animation: borderGlow 3s linear infinite;
        }
        
        .hologram-container::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--hologram-pink), var(--hologram-blue), transparent);
            animation: borderGlow 3s linear infinite reverse;
        }
        
        @keyframes borderGlow {
            0% { background-position: -500px 0; }
            100% { background-position: 500px 0; }
        }
        
        .maintenance-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--hologram-blue);
            text-shadow: 0 0 10px var(--glow-color);
            animation: pulse 2s infinite alternate;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            color: white;
            text-shadow: 0 0 8px var(--glow-color);
            letter-spacing: 1px;
        }
        
        p {
            margin-bottom: 1rem;
            line-height: 1.5;
            font-size: 0.9rem;
            color: #b0b0b0;
        }
        
        .countdown {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--hologram-blue);
            margin: 1.5rem 0;
            text-shadow: 0 0 8px var(--glow-color);
            letter-spacing: 2px;
        }
        
        .progress-container {
            height: 6px;
            background-color: rgba(0, 50, 80, 0.3);
            border-radius: 3px;
            margin: 1.5rem 0;
            overflow: hidden;
            position: relative;
        }
        
        .progress-bar {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, var(--hologram-blue), var(--hologram-pink));
            border-radius: 3px;
            position: relative;
            animation: progressColorShift 4s infinite alternate;
        }
        
        @keyframes progressColorShift {
            0% { background: linear-gradient(90deg, var(--hologram-blue), var(--hologram-pink)); }
            100% { background: linear-gradient(90deg, var(--hologram-pink), var(--hologram-blue)); }
        }
        
        .status-container {
            display: flex;
            justify-content: space-around;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        
        .status-item {
            margin: 0.5rem;
            padding: 0.5rem;
            border-radius: 5px;
            background: rgba(0, 20, 40, 0.5);
            flex: 1;
            min-width: 120px;
        }
        
        .status-title {
            font-size: 0.7rem;
            color: var(--hologram-blue);
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }
        
        .critical { color: var(--critical); }
        .warning { color: var(--warning); }
        .ok { color: var(--ok); }
        
        .task-list {
            text-align: left;
            margin: 1rem 0;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        
        .task-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(0, 150, 150, 0.2);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
        }
        
        .task-item::before {
            content: "•";
            color: var(--hologram-blue);
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }
        
        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }
        
        @media (max-width: 480px) {
            .hologram-container {
                padding: 1.5rem;
            }
            
            h1 {
                font-size: 1.3rem;
            }
            
            .countdown {
                font-size: 1.1rem;
            }
            
            .status-item {
                min-width: 100px;
            }
        }
        
        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 50, 80, 0.2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--hologram-blue);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="hologram-container">
        <div class="maintenance-icon">⚙️</div>
        <h1>ACTUALIZACIÓN DE LA PAGINA</h1>
        <p>Estamos implementando mejoras críticas para optimizar el rendimiento y la seguridad.</p>
        
        <div class="countdown" id="countdown">
            TIEMPO ESTIMADO: 48:00:00
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status-container">
            <div class="status-item">
                <div class="status-title">Estado</div>
                <div class="status-value" id="statusValue">En progreso</div>
            </div>
            <div class="status-item">
                <div class="status-title">Progreso</div>
                <div class="status-value" id="progressValue">35%</div>
            </div>
            <div class="status-item">
                <div class="status-title">Tareas</div>
                <div class="status-value" id="tasksValue">7/20</div>
            </div>
        </div>
        
        <h3 style="margin: 1rem 0 0.5rem; font-size: 0.9rem; color: var(--hologram-blue); text-align: left;">TAREAS EN CURSO:</h3>
        <div class="task-list" id="taskList">
            <!-- Las tareas se generarán dinámicamente -->
        </div>
    </div>

    <script>
        // Configuración inicial
        const MAINTENANCE_DURATION = 48 * 60 * 60; // 48 horas en segundos
        const TASKS = [
            "Actualización del núcleo del sistema",
            "Pruebas del sistema",
            "Pruebas de seguridad",
            "Preparación para relanzamiento con nuevos elementos"
        ];
        
        // Estado del sistema
        let state = {
            startTime: Date.now(),
            completedTasks: 0,
            currentProgress: 0,
            status: "active",
            tasks: TASKS.map(task => ({ name: task, completed: false }))
        };
        
        // Elementos del DOM
        const countdownElement = document.getElementById('countdown');
        const progressBarElement = document.getElementById('progressBar');
        const progressValueElement = document.getElementById('progressValue');
        const tasksValueElement = document.getElementById('tasksValue');
        const statusValueElement = document.getElementById('statusValue');
        const taskListElement = document.getElementById('taskList');
        
        // Inicializar la interfaz
        function init() {
            renderTasks();
            updateStatus();
            startCountdown();
            simulateProgress();
        }
        
        // Renderizar lista de tareas
        function renderTasks() {
            taskListElement.innerHTML = state.tasks.map(task => 
                `<div class="task-item ${task.completed ? 'completed' : ''}">${task.name}</div>`
            ).join('');
        }
        
        // Actualizar el estado del sistema
        function updateStatus() {
            const progress = Math.floor(state.currentProgress);
            const completedTasks = state.tasks.filter(t => t.completed).length;
            const totalTasks = state.tasks.length;
            
            // Actualizar valores
            progressValueElement.textContent = `${progress}%`;
            tasksValueElement.textContent = `${completedTasks}/${totalTasks}`;
            
            // Actualizar barra de progreso
            progressBarElement.style.width = `${progress}%`;
            
            // Determinar estado general
            if (progress >= 90) {
                statusValueElement.textContent = "Finalizando";
                statusValueElement.className = "status-value ok";
            } else if (progress >= 50) {
                statusValueElement.textContent = "En progreso";
                statusValueElement.className = "status-value warning";
            } else {
                statusValueElement.textContent = "Inicializando";
                statusValueElement.className = "status-value critical";
            }
        }
        
        // Simular progreso del mantenimiento
        function simulateProgress() {
            // Progreso basado en tiempo (50% del progreso)
            const timePassed = (Date.now() - state.startTime) / 1000;
            const timeBasedProgress = Math.min(50, (timePassed / MAINTENANCE_DURATION) * 50);
            
            // Progreso basado en tareas completadas (50% del progreso)
            const completedTasks = state.tasks.filter(t => t.completed).length;
            const taskBasedProgress = (completedTasks / state.tasks.length) * 50;
            
            state.currentProgress = timeBasedProgress + taskBasedProgress;
            
            // Completar tareas aleatoriamente
            if (Math.random() < 0.02 && completedTasks < state.tasks.length) {
                const incompleteTasks = state.tasks.filter(t => !t.completed);
                if (incompleteTasks.length > 0) {
                    const randomIndex = Math.floor(Math.random() * incompleteTasks.length);
                    incompleteTasks[randomIndex].completed = true;
                    renderTasks();
                }
            }
            
            updateStatus();
            
            if (state.currentProgress < 100) {
                setTimeout(simulateProgress, 1000);
            } else {
                statusValueElement.textContent = "Completado";
                statusValueElement.className = "status-value ok";
            }
        }
        
        // Contador regresivo inteligente
        function startCountdown() {
            const endTime = state.startTime + MAINTENANCE_DURATION * 1000;
            
            function update() {
                const now = Date.now();
                const remaining = Math.max(0, endTime - now);
                
                if (remaining <= 0) {
                    countdownElement.textContent = "MANTENIMIENTO COMPLETADO";
                    countdownElement.style.color = "var(--ok)";
                    return;
                }
                
                // Ajustar tiempo estimado basado en progreso
                const adjustedRemaining = remaining * (1 - state.currentProgress / 100);
                
                const hours = Math.floor(adjustedRemaining / (1000 * 60 * 60));
                const minutes = Math.floor((adjustedRemaining % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((adjustedRemaining % (1000 * 60)) / 1000);
                
                countdownElement.textContent = `TIEMPO ESTIMADO: ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                // Cambiar color según urgencia
                if (hours < 2) {
                    countdownElement.style.color = "var(--critical)";
                } else if (hours < 12) {
                    countdownElement.style.color = "var(--warning)";
                } else {
                    countdownElement.style.color = "var(--hologram-blue)";
                }
                
                requestAnimationFrame(update);
            }
            
            update();
        }
        
        // Iniciar el sistema
        window.onload = init;
    </script>
</body>
</html>
